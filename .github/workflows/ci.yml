# Continuous integration: musicians_canvas + sibling dependency audio_mixer_cpp
# (CMake expects ../audio_mixer_cpp relative to this repo — same layout as local dev.)
# audio_mixer_cpp: https://github.com/EricOulashin/audio_mixer_cpp

name: CI Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux and macOS ──────────────────────────────────────────────────
  build-unix:
    name: Build (${{ matrix.artifact_os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_os: Linux
          - os: macos-latest
            artifact_os: macOS

    steps:
      - name: Checkout musicians_canvas
        uses: actions/checkout@v5
        with:
          path: musicians_canvas

      - name: Checkout audio_mixer_cpp (sibling for CMake)
        uses: actions/checkout@v5
        with:
          repository: EricOulashin/audio_mixer_cpp
          path: audio_mixer_cpp

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-multimedia-dev \
            libfluidsynth-dev \
            librtmidi-dev \
            libflac-dev \
            libpipewire-0.3-dev \
            portaudio19-dev \
            qt6-l10n-tools \
            pkg-config
          pip3 install --break-system-packages markdown weasyprint 2>/dev/null || \
          pip3 install markdown weasyprint || true

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja qt@6 fluidsynth rtmidi flac portaudio pkgconf
          pip3 install --break-system-packages markdown weasyprint 2>/dev/null || \
          pip3 install markdown weasyprint || true

      - name: Configure Homebrew paths for CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6);$(brew --prefix)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix portaudio)/lib/pkgconfig:$(brew --prefix flac)/lib/pkgconfig:$(brew --prefix fluidsynth)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Configure and build
        shell: bash
        run: |
          set -euxo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          cmake -S "${ROOT}/musicians_canvas" -B "${ROOT}/musicians_canvas/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build "${ROOT}/musicians_canvas/build" --parallel

      - name: Extract version
        id: version
        shell: bash
        run: |
          ver=$(grep 'project(musicians_canvas VERSION' "${GITHUB_WORKSPACE}/musicians_canvas/CMakeLists.txt" | sed -E 's/.*VERSION ([0-9.]+).*/\1/' | tr -d '.')
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Generate FILE_ID.DIZ
        shell: bash
        run: |
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}/musicians_canvas"
          chmod +x ./makeDiz.sh
          ./makeDiz.sh "${{ matrix.artifact_os }}"

      - name: Test
        run: |
          cd "${GITHUB_WORKSPACE}/musicians_canvas/build"
          ctest --output-on-failure || true

      - name: Generate documentation
        shell: bash
        run: |
          cd "${GITHUB_WORKSPACE}/musicians_canvas/docs"
          chmod +x generate_docs.sh
          ./generate_docs.sh all || ./generate_docs.sh html || echo "Doc generation failed (non-fatal)"

      - name: Prepare release artifact
        shell: bash
        run: |
          ROOT="${GITHUB_WORKSPACE}"
          BUILD="${ROOT}/musicians_canvas/build"
          ARTIFACT_DIR="${ROOT}/MusiciansCanvas_${{ matrix.artifact_os }}"
          mkdir -p "${ARTIFACT_DIR}/docs"

          # Include FILE_ID.DIZ in the root of the packaged zip.
          cp "${ROOT}/musicians_canvas/FILE_ID.DIZ" "${ARTIFACT_DIR}/"

          if [ "${{ runner.os }}" = "macOS" ]; then
            # macOS: single .app bundle (virtual_midi_keyboard is inside Contents/MacOS/)
            APP="${ARTIFACT_DIR}/musicians_canvas.app"
            cp -R "${BUILD}/musicians_canvas.app" "${ARTIFACT_DIR}/"

            # Bundle shared libraries using macdeployqt
            MACDEPLOYQT=""
            command -v macdeployqt6 &>/dev/null && MACDEPLOYQT=macdeployqt6
            [ -z "$MACDEPLOYQT" ] && command -v macdeployqt &>/dev/null && MACDEPLOYQT=macdeployqt
            if [ -n "$MACDEPLOYQT" ]; then
              "$MACDEPLOYQT" "${APP}" 2>/dev/null || true
            else
              # Fallback: copy Homebrew dylibs into the Frameworks dir
              FRAMEWORKS="${APP}/Contents/Frameworks"
              mkdir -p "${FRAMEWORKS}"
              for exe in "${APP}/Contents/MacOS/musicians_canvas" "${APP}/Contents/MacOS/virtual_midi_keyboard"; do
                [ -f "$exe" ] || continue
                otool -L "$exe" 2>/dev/null | awk '/homebrew|opt/{print $1}' | while read -r lib; do
                  [ -f "$lib" ] && cp -n "$lib" "${FRAMEWORKS}/" 2>/dev/null || true
                done
              done
            fi

            # Copy .qm translation files into the bundle
            BUILD_TR="${BUILD}/translations"
            if [ -d "${BUILD_TR}" ]; then
              MACOS_TR="${APP}/Contents/MacOS/translations"
              mkdir -p "${MACOS_TR}"
              cp "${BUILD_TR}"/*.qm "${MACOS_TR}/" 2>/dev/null || true
            fi
          else
            # Linux: copy plain executables
            cp "${BUILD}/musicians_canvas" "${ARTIFACT_DIR}/"
            cp "${BUILD}/virtual_midi_keyboard" "${ARTIFACT_DIR}/"

            # Copy translation files
            BUILD_TR="${BUILD}/translations"
            if [ -d "${BUILD_TR}" ]; then
              mkdir -p "${ARTIFACT_DIR}/translations"
              cp "${BUILD_TR}"/*.qm "${ARTIFACT_DIR}/translations/" 2>/dev/null || true
            fi
          fi

          # Copy generated user manual (HTML and PDF) in all languages
          DOCS_DIR="${ROOT}/musicians_canvas/docs"
          if [ -d "${DOCS_DIR}/html" ]; then
            cp -r "${DOCS_DIR}/html" "${ARTIFACT_DIR}/docs/"
          fi
          for pdf in "${DOCS_DIR}"/MusiciansCanvas_User_Manual*.pdf; do
            [ -f "$pdf" ] && cp "$pdf" "${ARTIFACT_DIR}/docs/" || true
          done

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: MusiciansCanvas_${{ steps.version.outputs.ver }}_${{ matrix.artifact_os }}
          path: MusiciansCanvas_${{ matrix.artifact_os }}/
          retention-days: 90

  # ── Windows (MSYS2 / MinGW) ─────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout musicians_canvas
        uses: actions/checkout@v5
        with:
          path: musicians_canvas

      - name: Checkout audio_mixer_cpp (sibling for CMake)
        uses: actions/checkout@v5
        with:
          repository: EricOulashin/audio_mixer_cpp
          path: audio_mixer_cpp

      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-fluidsynth
            mingw-w64-x86_64-flac
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-ntldd-git

      # RtMidi: the MSYS2 package is in the ucrt repo, not mingw64.
      # Try installing; if unavailable, build will use find_library fallback.
      - name: Install RtMidi (MSYS2)
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm mingw-w64-x86_64-rtmidi 2>/dev/null || \
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-rtmidi 2>/dev/null || \
          echo "RtMidi package not found — CMake will try find_library fallback"

      - name: Install doc generation tools (MSYS2)
        shell: msys2 {0}
        run: |
          pip3 install markdown weasyprint 2>/dev/null || \
          pip install markdown weasyprint 2>/dev/null || \
          echo "Doc generation tools not available (non-fatal)"

      - name: Configure and build
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          cmake -S "${ROOT}/musicians_canvas" -B "${ROOT}/musicians_canvas/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build "${ROOT}/musicians_canvas/build" --parallel

      - name: Extract version
        id: version
        shell: bash
        run: |
          verdot=$(grep 'project(musicians_canvas VERSION' "${GITHUB_WORKSPACE}/musicians_canvas/CMakeLists.txt" | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          ver=$(echo "$verdot" | tr -d '.')
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "verdot=$verdot" >> "$GITHUB_OUTPUT"

      - name: Generate FILE_ID.DIZ
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}/musicians_canvas"
          chmod +x ./makeDiz.sh
          ./makeDiz.sh "Windows"

      - name: Test
        shell: msys2 {0}
        run: |
          cd "${GITHUB_WORKSPACE}/musicians_canvas/build"
          ctest --output-on-failure || true

      - name: Generate documentation
        shell: msys2 {0}
        run: |
          cd "${GITHUB_WORKSPACE}/musicians_canvas/docs"
          chmod +x generate_docs.sh
          ./generate_docs.sh all || ./generate_docs.sh html || echo "Doc generation failed (non-fatal)"

      - name: Prepare release artifact
        shell: msys2 {0}
        run: |
          ROOT="${GITHUB_WORKSPACE}"
          ARTIFACT_DIR="${ROOT}/MusiciansCanvas_Windows"
          mkdir -p "${ARTIFACT_DIR}/docs"

          # Include FILE_ID.DIZ in the root of the packaged zip.
          cp "${ROOT}/musicians_canvas/FILE_ID.DIZ" "${ARTIFACT_DIR}/"

          # Copy executables
          cp "${ROOT}/musicians_canvas/build/musicians_canvas.exe" "${ARTIFACT_DIR}/"
          cp "${ROOT}/musicians_canvas/build/virtual_midi_keyboard.exe" "${ARTIFACT_DIR}/"

          # Copy compiled translation files (.qm) for localization
          BUILD_TR="${ROOT}/musicians_canvas/build/translations"
          if [ -d "${BUILD_TR}" ]; then
            mkdir -p "${ARTIFACT_DIR}/translations"
            cp "${BUILD_TR}"/*.qm "${ARTIFACT_DIR}/translations/" 2>/dev/null || true
          fi

          # Copy generated user manual (HTML and PDF) in all languages
          DOCS_DIR="${ROOT}/musicians_canvas/docs"
          if [ -d "${DOCS_DIR}/html" ]; then
            cp -r "${DOCS_DIR}/html" "${ARTIFACT_DIR}/docs/"
          fi
          for pdf in "${DOCS_DIR}"/MusiciansCanvas_User_Manual*.pdf; do
            [ -f "$pdf" ] && cp "$pdf" "${ARTIFACT_DIR}/docs/" || true
          done

          # Copy required DLLs from the MSYS2 MinGW64 bin directory.
          # windeployqt6 handles Qt plugins and platform DLLs.
          MINGW_BIN="/mingw64/bin"
          if command -v windeployqt6 &>/dev/null; then
            windeployqt6 --no-translations --no-opengl-sw \
              "${ARTIFACT_DIR}/musicians_canvas.exe" || true
            windeployqt6 --no-translations --no-opengl-sw \
              "${ARTIFACT_DIR}/virtual_midi_keyboard.exe" || true
          fi

          # ─── Recursive transitive-dependency discovery via ntldd ───
          # ntldd is the MinGW equivalent of ldd.  `-R` walks the entire
          # transitive dependency tree of a PE binary and prints every DLL
          # the loader will need.  By running it on each .exe in the artifact
          # dir AND on every DLL we just copied (windeployqt's output, etc.),
          # we discover everything: FluidSynth + libsndfile + codec deps,
          # GLib, ICU, OpenMP, Qt transitive deps, and so on.
          #
          # We keep iterating until no new DLLs get added — that handles the
          # case where a freshly-copied DLL itself drags in deps that ntldd
          # didn't see in earlier passes.
          collect_deps_pass() {
            local added=0
            local target
            shopt -s nullglob
            for target in "${ARTIFACT_DIR}"/*.exe "${ARTIFACT_DIR}"/*.dll; do
              ntldd -R "${target}" 2>/dev/null \
                | awk '/=>/ {print $3}' \
                | grep -i "/mingw64/" \
                | sort -u \
                | while read -r dep; do
                    [ -f "${dep}" ] || continue
                    name=$(basename "${dep}")
                    if [ ! -f "${ARTIFACT_DIR}/${name}" ]; then
                      cp "${dep}" "${ARTIFACT_DIR}/"
                      echo "  + ${name}"
                      added=1
                    fi
                  done
            done
            shopt -u nullglob
            return ${added}
          }

          if command -v ntldd &>/dev/null; then
            echo "Discovering transitive DLL dependencies with ntldd..."
            for pass in 1 2 3 4 5; do
              echo "Pass ${pass}:"
              before=$(ls -1 "${ARTIFACT_DIR}"/*.dll 2>/dev/null | wc -l)
              collect_deps_pass || true
              after=$(ls -1 "${ARTIFACT_DIR}"/*.dll 2>/dev/null | wc -l)
              if [ "${before}" = "${after}" ]; then
                echo "  (no new DLLs — done)"
                break
              fi
            done
          else
            echo "::warning::ntldd not available — falling back to hand-curated DLL list"
          fi

          # ─── Fallback / belt-and-braces explicit DLL list ───
          # ntldd's static analysis only sees DLLs listed in the import
          # tables.  Some FluidSynth dependencies (libreadline, SDL3, libb2,
          # etc.) are loaded dynamically via LoadLibrary at runtime and
          # therefore aren't visible to ntldd.  This explicit list catches
          # them as well as any other DLLs that aren't discovered above.
          shopt -s nullglob
          for dll in "${MINGW_BIN}"/libfluidsynth*.dll \
                     "${MINGW_BIN}"/librtmidi*.dll \
                     "${MINGW_BIN}"/libFLAC*.dll \
                     "${MINGW_BIN}"/libportaudio*.dll \
                     "${MINGW_BIN}"/libicuin*.dll \
                     "${MINGW_BIN}"/libicuuc*.dll \
                     "${MINGW_BIN}"/libicudt*.dll \
                     "${MINGW_BIN}"/libpcre2-*.dll \
                     "${MINGW_BIN}"/libssp*.dll \
                     "${MINGW_BIN}"/libreadline*.dll \
                     "${MINGW_BIN}"/libhistory*.dll \
                     "${MINGW_BIN}"/libtermcap*.dll \
                     "${MINGW_BIN}"/libncurses*.dll \
                     "${MINGW_BIN}"/libb2-*.dll \
                     "${MINGW_BIN}"/libsystre*.dll \
                     "${MINGW_BIN}"/libtre-*.dll \
                     "${MINGW_BIN}"/SDL*.dll \
                     "${MINGW_BIN}"/libSDL*.dll; do
            name=$(basename "${dll}")
            [ -f "${ARTIFACT_DIR}/${name}" ] || cp "${dll}" "${ARTIFACT_DIR}/" 2>/dev/null || true
          done
          shopt -u nullglob
          for dll in libglib-2.0-0.dll libgthread-2.0-0.dll libgobject-2.0-0.dll \
                     libgmodule-2.0-0.dll libgio-2.0-0.dll \
                     libintl-8.dll libiconv-2.dll libffi-8.dll \
                     libgomp-1.dll \
                     libsndfile-1.dll libvorbis-0.dll libvorbisenc-2.dll libogg-0.dll \
                     libopus-0.dll libmpg123-0.dll libmp3lame-0.dll \
                     libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll \
                     libharfbuzz-0.dll libpng16-16.dll zlib1.dll libjpeg-8.dll \
                     libfreetype-6.dll libbz2-1.dll libbrotlidec.dll libbrotlienc.dll \
                     libbrotlicommon.dll libdouble-conversion.dll libzstd.dll \
                     libmd4c.dll libgraphite2.dll libcrypto-3-x64.dll libssl-3-x64.dll \
                     libsamplerate-0.dll libinstpatch-2.dll libsodium-26.dll; do
            if [ -f "${MINGW_BIN}/${dll}" ] && [ ! -f "${ARTIFACT_DIR}/${dll}" ]; then
              cp "${MINGW_BIN}/${dll}" "${ARTIFACT_DIR}/" 2>/dev/null || true
            fi
          done

          # Sanity check: warn loudly if any known-required third-party DLL
          # is still missing from the artifact dir.
          for required in libFLAC libfluidsynth-3 libportaudio librtmidi \
                          libsndfile libglib libgomp libgcc_s libstdc \
                          libreadline SDL libb2; do
            if ! ls "${ARTIFACT_DIR}/${required}"*.dll 1>/dev/null 2>&1; then
              echo "::warning::Required DLL ${required}*.dll not found in artifact"
            fi
          done

          echo "Total DLL count in artifact: $(ls -1 "${ARTIFACT_DIR}"/*.dll 2>/dev/null | wc -l)"

      - name: Upload release artifact (zip / portable)
        uses: actions/upload-artifact@v5
        with:
          name: MusiciansCanvas_${{ steps.version.outputs.ver }}_Windows
          path: MusiciansCanvas_Windows/
          retention-days: 90

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          $stagingDir = "${env:GITHUB_WORKSPACE}\MusiciansCanvas_Windows"
          $outBaseName = "MusiciansCanvas_${{ steps.version.outputs.ver }}_Windows"
          $outDir     = "${env:GITHUB_WORKSPACE}"
          $appVersion = "${{ steps.version.outputs.verdot }}"
          $iss        = "${env:GITHUB_WORKSPACE}\musicians_canvas\windows_installer\musicians_canvas.iss"
          Write-Host "Building installer: $outDir\$outBaseName.exe (version $appVersion)"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\iscc.exe"
          }
          & $iscc `
            "/Qp" `
            "/DStagingDir=$stagingDir" `
            "/DAppVersion=$appVersion" `
            "/DOutputBaseName=$outBaseName" `
            "/O$outDir" `
            $iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup compiler exited with code $LASTEXITCODE"
            exit 1
          }
          $exePath = "$outDir\$outBaseName.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "Installer was not produced at $exePath"
            exit 1
          }
          Write-Host "Installer built successfully: $((Get-Item $exePath).Length) bytes"

      - name: Generate FILE_ID.DIZ (Windows Installer)
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}/musicians_canvas"
          chmod +x ./makeDiz.sh
          ./makeDiz.sh "Windows Installer"

      - name: Upload Windows installer (.exe)
        uses: actions/upload-artifact@v5
        with:
          # The "installer artifact" is the raw Inno Setup .exe — we deliberately
          # do NOT pre-zip it. (GitHub Actions itself wraps every artifact in a
          # .zip for download; that wrapping is unavoidable, but the resulting
          # download zip contains nothing other than this single .exe file.)
          name: MusiciansCanvas_${{ steps.version.outputs.ver }}_Windows_Installer
          path: |
            ${{ github.workspace }}/MusiciansCanvas_${{ steps.version.outputs.ver }}_Windows.exe
            ${{ github.workspace }}/musicians_canvas/FILE_ID.DIZ
          if-no-files-found: error
          retention-days: 90
